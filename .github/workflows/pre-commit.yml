name: Pre-commit Checks

on:
  push:
    branches: [ "main" ]
    paths: &format_paths
      - '**.cpp'
      - '**.hpp'
      - '**.h'
      - '**.c'
      - '.clang-format'
      - 'CMakeLists.txt'
  pull_request:
    branches: [ "main" ]
    paths: *format_paths

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1
